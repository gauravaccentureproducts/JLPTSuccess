<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSP: static-only, no third-party.
       ISSUE-012 (2026-05-04 round-2 audit): split style-src into
       style-src-elem ('self', no inline) and style-src-attr ('self'
       'unsafe-inline', for dynamic progress-bar widths etc.). This
       forbids inline <style> element injection (the high-risk vector)
       while still allowing the legitimate `style="width:N%"` attribute
       writes used by progress bars across test/drill/diagnostic/home/
       summary modules. The legacy `style-src 'self' 'unsafe-inline'` is
       retained as a fallback for CSP-Level-2 user agents that ignore
       the -elem/-attr directives.
       script-src omits 'unsafe-inline' so any inline-script regression
       fails fast. Per OQ-3 in spec supplement §B.9. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; style-src-elem 'self'; style-src-attr 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'none';">
  <title>JLPT N5</title>
  <meta name="description" content="JLPT N5 study material covering grammar, vocabulary, kanji, reading, and listening — static, on-device, privacy-preserving. No login. No tracking. Works offline.">
  <meta name="theme-color" content="#14452a">
  <meta name="color-scheme" content="light dark">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://gauravaccentureproducts.github.io/JLPTSuccess/N5/">
  <!-- ISSUE-032 + IMP-051 (audit round-4): social-share preview metadata.
       og:image is shared for both Open Graph (Facebook/LinkedIn/Discord/Slack)
       and Twitter Cards. JSON-LD EducationalApplication schema feeds Google
       knowledge-panel + structured-data search results. Without these the
       app's link previews degraded to "no preview" on every social platform. -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="JLPT N5 — free multilingual study material">
  <meta property="og:description" content="Grammar, vocabulary, kanji, reading, listening, mock tests. No login. No tracking. Works offline. Open source.">
  <meta property="og:url" content="https://gauravaccentureproducts.github.io/JLPTSuccess/N5/">
  <meta property="og:image" content="https://gauravaccentureproducts.github.io/JLPTSuccess/assets/logo/icon-512.png">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="vi_VN">
  <meta property="og:locale:alternate" content="id_ID">
  <meta property="og:locale:alternate" content="ne_NP">
  <meta property="og:locale:alternate" content="zh_CN">
  <meta property="og:site_name" content="JLPTSuccess">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="JLPT N5 — free multilingual study material">
  <meta name="twitter:description" content="Grammar, vocabulary, kanji, reading, listening, mock tests. No login. No tracking. Works offline.">
  <meta name="twitter:image" content="https://gauravaccentureproducts.github.io/JLPTSuccess/assets/logo/icon-512.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalApplication",
    "name": "JLPTSuccess N5",
    "description": "Free multilingual JLPT N5 study material — grammar, vocabulary, kanji, reading, listening, mock tests. No login, no tracking, works offline.",
    "url": "https://gauravaccentureproducts.github.io/JLPTSuccess/N5/",
    "image": "https://gauravaccentureproducts.github.io/JLPTSuccess/assets/logo/icon-512.png",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "any (PWA)",
    "inLanguage": ["en", "vi", "id", "ne", "zh", "ja"],
    "isAccessibleForFree": true,
    "license": "https://opensource.org/licenses/MIT",
    "educationalLevel": "JLPT N5",
    "teaches": "Japanese language (JLPT N5 syllabus): grammar, vocabulary, kanji, reading, listening",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
  <!-- Brand favicon: the canonical JLPTSuccess five-bar mark, served from
       the top-level assets/logo/. Same mark across the whole suite — the
       N-level no longer appears in the favicon since the level is conveyed
       in the URL bar (.../N5/) and the page title. -->
  <link rel="icon" type="image/svg+xml" href="../assets/logo/mark.svg">
  <link rel="apple-touch-icon" href="../assets/logo/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- Preload the two most-used fonts so first paint isn't a system-font
       flash. Inter Regular (latin body) + Noto Sans JP (every ja example).
       Light + Medium load on demand via the @font-face fallback chain. -->
  <link rel="preload" href="fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/noto-sans-jp-400.woff2" as="font" type="font/woff2" crossorigin>
  <!-- IMP-021 (audit round-2): use the build-minified stylesheet. The
       source `css/main.css` stays in the repo for editing; `main.min.css`
       is regenerated by `python tools/build_min_css.py` before each
       release (~34% smaller). -->
  <link rel="stylesheet" href="css/main.min.css?v=1.12.36">
</head>
<body>
  <a href="#app" class="skip-link">Skip to main content</a>
  <header class="app-header" role="banner">
    <div class="brand">
      <!-- Brand-link routes to the level picker (Level 1). Inside an
           N5 context the visible label still says "JLPT N5" because
           the user IS on N5; clicking returns them to the level
           chooser to pick another level. -->
      <h1><a href="../" class="brand-link" aria-label="JLPTSuccess home, choose a level">JLPT N5</a></h1>
    </div>
    <nav class="primary-nav" aria-label="Primary">
      <a href="#/learn/grammar" data-route="learn/grammar">Grammar</a>
      <a href="#/learn/vocab" data-route="learn/vocab">Vocabulary</a>
      <a href="#/kanji" data-route="kanji">Kanji</a>
      <a href="#/reading" data-route="reading">Reading</a>
      <a href="#/listening" data-route="listening">Listening</a>
      <a href="#/test" data-route="test">Test</a>
      <!-- ISSUE-039 + IMP-061 (audit round-5): surface the round-3
           routes that were previously orphaned (only reachable from
           Test / Review CTAs). Mock = full mock-paper sitting flow;
           Missed = wrong-answer history log. -->
      <a href="#/sitting" data-route="sitting">Mock</a>
      <a href="#/missed" data-route="missed">Missed</a>
      <a href="#/summary" data-route="summary">Progress</a>
    </nav>
    <nav class="secondary-nav" aria-label="Secondary">
      <!-- ISSUE-028 (audit round-4): visible locale switcher on first paint.
           5 chips, picks per-locale; click swaps the i18n locale. The
           Settings panel still has the canonical select for keyboard nav. -->
      <div class="locale-chip-group" id="locale-chip-group" role="group" aria-label="Choose language">
        <button type="button" class="locale-chip" data-lc="en" lang="en">EN</button>
        <button type="button" class="locale-chip" data-lc="vi" lang="vi" title="Tiếng Việt">VI</button>
        <button type="button" class="locale-chip" data-lc="id" lang="id" title="Bahasa Indonesia">ID</button>
        <button type="button" class="locale-chip" data-lc="ne" lang="ne" title="नेपाली">NE</button>
        <button type="button" class="locale-chip" data-lc="zh" lang="zh" title="中文">ZH</button>
      </div>
      <input type="search" id="search-input" placeholder="Search" aria-label="Search grammar / vocab / kanji" autocomplete="off">
      <button type="button" id="fullscreen-toggle" class="icon-btn" aria-label="Toggle fullscreen" title="Toggle fullscreen">
        <!-- lucide-style maximize icon (4 corner brackets). aria-hidden on the
             SVG itself; the button carries the accessible name. -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" width="18" height="18">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
          <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
          <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
      <a href="#/settings" data-route="settings" class="icon-btn" aria-label="Settings" title="Settings">
        <!-- lucide-style settings cog icon. -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" width="18" height="18">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </a>
    </nav>
  </header>


  <main id="app" role="main" tabindex="-1">
    <div class="skeleton-wrap" role="status" aria-live="polite" aria-label="Loading">
      <div class="skeleton skeleton-title" aria-hidden="true"></div>
      <div class="skeleton skeleton-tagline" aria-hidden="true"></div>
      <div class="skeleton-ctas" aria-hidden="true">
        <div class="skeleton skeleton-btn"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
      <div class="skeleton-pillars" aria-hidden="true">
        <div class="skeleton skeleton-pillar"></div>
        <div class="skeleton skeleton-pillar"></div>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <small class="footer-meta">Version <span data-footer-version aria-label="App version">v1.12.36</span></small>
    <nav class="footer-nav" aria-label="Footer">
      <a href="#/changelog" data-route="changelog">What's new</a>
      <a href="PRIVACY.md">Privacy</a>
      <a href="NOTICES.md">Notices</a>
      <a href="#/feedback" data-route="feedback">Feedback</a>
    </nav>
  </footer>

  <!-- ISSUE-043 (audit round-5): runtime references the minified
       JS bundle in js/min/ (esbuild --minify, ~57% smaller than the
       sources). The unminified js/<name>.js files stay in the repo +
       precache so DevTools "Sources" tab can resolve them when
       debugging on-device. Regen via `python tools/build_min_js.py`. -->
  <script type="module" src="js/min/app.js?v=1.12.36"></script>
</body>
</html>
