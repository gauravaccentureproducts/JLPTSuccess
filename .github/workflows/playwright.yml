name: playwright-p0-smoke

# P0 smoke suite from feedback/ui-testing-plan.md §17.1.
# Runs ~15 tests across 2 device profiles (Desktop Chrome + Pixel 5
# mobile) with axe-core a11y scans on the 6 highest-traffic routes.
# Total time budget: ~2 min on CI.
#
# Local run:
#   npm install
#   npm run test:install-browsers
#   npm run test:smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # workflow_dispatch supports manual triggering. The
  # `update_snapshots` input lets a maintainer regenerate the
  # platform-specific visual-regression baselines (e.g., -linux.png)
  # without committing them from a different-OS dev box. See the
  # "Update visual-regression baselines" step below.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Run visual-regression with --update-snapshots and upload the new baselines as an artifact'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  smoke:
    defaults:
      run:
        working-directory: N5
    runs-on: ubuntu-latest
    # 2026-05-21: bumped from 8 → 12 → 15 minutes.
    #
    # First bump (8→12) was a wrong-cause guess: I assumed cold
    # browser install was the bottleneck. Run d65d8c8 showed
    # otherwise — browser install was only 25 sec; actual
    # `npx playwright test` execution was 11m39s. GitHub-hosted
    # ubuntu-latest 2-core runners run the test suite ~2.5× slower
    # than the local Windows machine (4.6 min local → 11m39s CI).
    #
    # Second bump (12→15) gives ~25% safety margin over the
    # observed 11m39s. Cache (below) is preserved for incremental
    # gains on subsequent runs; the dominant cost is the test
    # execution itself, not the setup.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: N5/package-lock.json

      - name: Set up Python (for the static webServer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node deps
        run: npm ci || npm install

      # 2026-05-21: Playwright browser-binary cache. The
      # `npx playwright install --with-deps chromium` step downloads
      # ~170 MB of Chromium binaries + apt-installs system deps;
      # took ~3-4 min on cold runs. Caching keyed on (OS + Playwright
      # version from package-lock.json) means subsequent runs hit a
      # warm cache and skip both the npx install AND the apt step on
      # cache hit. ~PLAYWRIGHT_BROWSERS_PATH points to the cache.
      - name: Get Playwright version
        id: pwver
        working-directory: .
        run: |
          PW_VERSION=$(node -p "require('./N5/package-lock.json').packages['N5/node_modules/@playwright/test'].version" 2>/dev/null || echo "unknown")
          echo "version=$PW_VERSION" >> $GITHUB_OUTPUT
          echo "Cached against Playwright version: $PW_VERSION"

      - name: Cache Playwright browser binaries
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pwver.outputs.version }}

      - name: Install Playwright browsers (full install on cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only (on cache hit)
        # On cache hit the browser binary is restored from cache but
        # apt-installed system libs (libnss3, libgbm1, etc.) are not.
        # Install just the system-deps without re-downloading the
        # browser binary.
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run P0 smoke + visual regression
        # Visual-regression suite was wired in 2026-05-03 (DEFER-6
        # closure): baselines committed under
        # tests/visual-regression.spec.js-snapshots/ for 6 routes × 2
        # viewports × 2 projects = 24 PNGs. The suite captures full-page
        # screenshots with `prefers-reduced-motion: reduce` emulation
        # and `networkidle` wait, masks the daily-status row on home,
        # and accepts maxDiffPixelRatio = 0.001 (sub-pixel font noise).
        # To refresh after intentional layout changes:
        #   npm run test:visual:update      # locally, then commit PNGs.
        #
        # 2026-05-21: PLAYWRIGHT_UPDATE_SNAPSHOTS=true is set by the
        # workflow_dispatch input above. When set, visual-regression
        # specs are unskipped (otherwise they're gated to local-only)
        # and the test runner is invoked with --update-snapshots so
        # missing baselines are written instead of failing.
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            echo "Running with --update-snapshots (regenerating baselines)"
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
        env:
          CI: '1'
          PLAYWRIGHT_UPDATE_SNAPSHOTS: ${{ github.event.inputs.update_snapshots || 'false' }}

      - name: Upload regenerated visual-regression baselines
        # Only fires for workflow_dispatch with update_snapshots=true.
        # Uploads the entire snapshots dir so the maintainer can
        # download + extract only the new -linux.png files + commit them.
        if: github.event.inputs.update_snapshots == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-baselines
          path: N5/tests/visual-regression.spec.js-snapshots/
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces for failed tests
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
